<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shapes & Colors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      gap: 60px;
      padding: 60px 20px;
    }

    h1 {
      color: #e0e0ff;
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: center;
      justify-content: center;
    }

    /* Circle */
    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff6ec7, #c026d3);
      box-shadow: 0 0 30px #c026d388;
      animation: pulse 3s ease-in-out infinite;
    }

    /* Triangle */
    .triangle {
      width: 0;
      height: 0;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      border-bottom: 104px solid #f59e0b;
      filter: drop-shadow(0 0 14px #f59e0b99);
      animation: sway 4s ease-in-out infinite;
    }

    /* Square */
    .square {
      width: 110px;
      height: 110px;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border-radius: 8px;
      box-shadow: 0 0 30px #3b82f666;
      animation: spin 8s linear infinite;
    }

    /* Pentagon */
    .pentagon {
      width: 100px;
      height: 95px;
      position: relative;
      background: #4ade80;
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      box-shadow: 0 0 30px #4ade8066;
      animation: pulse 2.5s ease-in-out infinite alternate;
    }

    /* Diamond */
    .diamond {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #f87171, #fb923c);
      transform: rotate(45deg);
      border-radius: 6px;
      box-shadow: 0 0 30px #f8717166;
      animation: sway 3.5s ease-in-out infinite;
    }

    /* Star */
    .star {
      width: 0;
      height: 0;
      position: relative;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 70px solid #a78bfa;
      filter: drop-shadow(0 0 14px #a78bfa99);
    }
    .star::after {
      content: '';
      position: absolute;
      left: -50px;
      top: 22px;
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-top: 70px solid #a78bfa;
    }

    /* Donut */
    .donut {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 22px solid #34d399;
      box-shadow: 0 0 30px #34d39966, inset 0 0 20px #34d39933;
      animation: spin 6s linear infinite reverse;
    }

    /* Blob */
    .blob {
      width: 120px;
      height: 110px;
      background: linear-gradient(135deg, #f472b6, #818cf8);
      border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%;
      box-shadow: 0 0 30px #818cf866;
      animation: morph 6s ease-in-out infinite;
    }

    /* Animations */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes sway {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes morph {
      0%, 100% { border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%; }
      25%       { border-radius: 60% 40% 45% 55% / 45% 55% 50% 50%; }
      50%       { border-radius: 50% 50% 60% 40% / 60% 40% 55% 45%; }
      75%       { border-radius: 45% 55% 40% 60% / 50% 60% 40% 55%; }
    }
  </style>
</head>
<body>
  <h1>Shapes &amp; Colors</h1>

  <div class="row">
    <div class="circle"></div>
    <div class="triangle"></div>
    <div class="square"></div>
    <div class="pentagon"></div>
  </div>

  <div class="row">
    <div class="diamond"></div>
    <div class="star"></div>
    <div class="donut"></div>
    <div class="blob"></div>
  </div>
</body>
</html>
